---
- name: Set up Frog cloud VM
  hosts: frog
  become: true
  gather_facts: true

  vars:
    # renovate: datasource=github-releases depName=cloudflare/cloudflared
    cloudflared_version: "2026.2.0"
    cloudflared_bin_path: /usr/local/bin/cloudflared
    podman_user: "frog"
    subid_start: 100000
    subid_count: 65536

  tasks:
    - name: Ensure proper Alpine repositories are selected
      ansible.builtin.copy:
        dest: /etc/apk/repositories
        owner: root
        group: root
        mode: '0644'
        content: |
          https://dl-cdn.alpinelinux.org/alpine/edge/main
          https://dl-cdn.alpinelinux.org/alpine/edge/community
          https://dl-cdn.alpinelinux.org/alpine/edge/testing

    - name: Update Alpine package index
      ansible.builtin.apk:
        update_cache: yes

    - name: Upgrade all installed packages
      ansible.builtin.apk:
        upgrade: yes

    - name: Install required packages
      ansible.builtin.apk:
        name:
          - libc6-compat
          - shadow
          - podman
          - fuse-overlayfs
          - slirp4netns
        state: present
        update_cache: yes

    - name: Remove /tmp/storage-run-* if exists
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_fileglob:
        - /tmp/storage-run-*
      ignore_errors: yes

    - name: Find podman binary
      ansible.builtin.command:
        cmd: "which podman"
      register: podman_path
      changed_when: false
      failed_when: podman_path.rc != 0

    - name: Restrict Podman binary to root only
      ansible.builtin.file:
        path: "{{ podman_path.stdout }}"
        owner: root
        group: root
        mode: '0750'
      when: podman_path.stdout != ''

    - name: Verify Podman works (info)
      ansible.builtin.command:
        cmd: podman info
      register: podman_info
      changed_when: false

    - ansible.builtin.debug:
        var: podman_info.stdout

    - name: Map architecture to cloudflared naming
      ansible.builtin.set_fact:
        cloudflared_arch: >-
          {{
            'amd64' if ansible_facts['architecture'] == 'x86_64' else
            'arm64' if ansible_facts['architecture'] == 'aarch64' else
            'arm' if ansible_facts['architecture'] == 'armv7l' else
            '386' if ansible_facts['architecture'] == 'i386' else
            ansible_facts['architecture']
          }}

    - name: Download cloudflared binary
      ansible.builtin.get_url:
        url: "https://github.com/cloudflare/cloudflared/releases/download/{{ cloudflared_version }}/cloudflared-linux-{{ cloudflared_arch }}"
        dest: "{{ cloudflared_bin_path }}"
        mode: '0755'
        owner: root
        group: root
      notify: Restart cloudflared

    - name: Determine service file path
      ansible.builtin.set_fact:
        cloudflared_service_path: "{{ '/etc/init.d/cloudflared' if ansible_facts['service_mgr'] == 'openrc' else '/etc/systemd/system/cloudflared.service' }}"
      when: ansible_facts['service_mgr'] in ['openrc', 'systemd']

    - name: Check if cloudflared service is installed
      ansible.builtin.stat:
        path: "{{ cloudflared_service_path }}"
      register: cloudflared_service_stat
      when: cloudflared_service_path is defined

    - name: Install cloudflared service
      ansible.builtin.command:
        cmd: "{{ cloudflared_bin_path }} service install {{ cloudflared_token }}"
      when:
        - cloudflared_service_stat is defined
        - not cloudflared_service_stat.stat.exists
        - cloudflared_token is defined
      notify: Restart cloudflared

    - name: Fail if token is missing for new installation
      ansible.builtin.fail:
        msg: "cloudflared_token must be defined to install the service."
      when:
        - cloudflared_service_stat is defined
        - not cloudflared_service_stat.stat.exists
        - cloudflared_token is not defined

  handlers:
    - name: Restart cloudflared
      block:
        - name: Wait 5 seconds before restarting cloudflared
          ansible.builtin.pause:
            seconds: 5
        - name: Restart cloudflared service
          ansible.builtin.service:
            name: cloudflared
            state: restarted
            enabled: true
